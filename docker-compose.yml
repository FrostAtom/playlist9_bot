services:
  bot:
    # Published image — `docker compose pull && docker compose up -d` works with
    # just this file. From a clone, `docker compose up -d --build` builds locally.
    image: ghcr.io/frostatom/playlist9_bot:latest
    build: .
    container_name: playlist9_bot
    restart: unless-stopped
    # Configure the bot here. Fill TELEGRAM_BOT_TOKEN (required). Optionally set
    # STORAGE_CHAT_ID to enable inline file delivery. The rest may stay empty —
    # empty values fall back to defaults (50 / 30 / 10 / 192).
    environment:
      TELEGRAM_BOT_TOKEN: ""
      STORAGE_CHAT_ID: ""
      MAX_FILE_SIZE_MB: ""
      MAX_RESULTS: ""
      RESULTS_PER_PAGE: ""
      AUDIO_QUALITY: ""
    # Give the bot time to finish in-flight work on SIGTERM before SIGKILL.
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
