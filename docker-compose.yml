services:
  bot:
    image: ghcr.io/frostatom/playlist9_bot:latest
    container_name: playlist9_bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ""
      STORAGE_CHAT_ID: ""
      COOKIES_FILE: ""
      DATABASE_HOST: "db"
      DATABASE_PORT: "5432"
      DATABASE_USER: "playlist9"
      DATABASE_PASSWORD: "playlist9"
      DATABASE_NAME: "playlist9"
    volumes:
      - ./cookies:/cookies
    ports:
      - "8473:8473"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: playlist9_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "playlist9"
      POSTGRES_PASSWORD: "playlist9"
      POSTGRES_DB: "playlist9"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playlist9 -d playlist9"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
